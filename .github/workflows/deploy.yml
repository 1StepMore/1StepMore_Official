name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS Hardcode (intercept AI slop)
        run: |
          if grep -rnE 'color: #(.*);|color: rgb|color: hsl|color: red|color: blue|color: black|color: white' src/; then
            echo "ERROR: Hardcoded colors found. Use var(--od-*) tokens only."
            exit 1
          fi
          for token in "--od-color-ai-speed" "--od-color-human-touch" "--od-font-display" "--od-radius-ai-speed"; do
            if ! grep -q "$token" src/styles/od-tokens.css; then
              echo "ERROR: Required token $token missing from od-tokens.css"
              exit 1
            fi
          done
          echo "PASS: Token integrity verified"

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4