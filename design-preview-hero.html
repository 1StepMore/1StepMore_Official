<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Design Preview — 壹目贯维</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-primary: #6366F1;
      --color-primary-dark: #4F46E5;
      --color-bg: #F8F5F0;
      --color-bg-dark: #EDE9E0;
      --color-text: #1a1a2e;
      --color-text-secondary: #4a4a6a;
      --color-white: #ffffff;
      --radius-sm: 4px;
      --radius-lg: 12px;
    }
    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--color-bg);
      color: var(--color-text);
    }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 3rem;
      background: rgba(248,245,240,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(99,102,241,0.1);
    }
    .nav-logo { font-family: 'Geist Sans', system-ui, sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--color-primary); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.875rem; font-weight: 500; color: var(--color-text-secondary); text-decoration: none; }
    .nav-links a:hover { color: var(--color-primary); }
    .nav-cta { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.875rem; font-weight: 600; color: var(--color-white); background: var(--color-primary); padding: 0.5rem 1.25rem; border-radius: var(--radius-lg); text-decoration: none; }

    /* Hero */
    .hero-inner {
      max-width: 1280px; margin: 0 auto;
      padding: 8rem 3rem 5rem;
      display: grid; grid-template-columns: 1fr 1fr;
      align-items: center; gap: 4rem;
    }

    /* Badge */
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 999px; padding: 0.35rem 1rem;
      font-family: 'Geist Sans', system-ui, sans-serif;
      font-size: 0.8rem; font-weight: 500; color: var(--color-primary);
      margin-bottom: 1.5rem;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-primary); animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Headline */
    .hero-headline { font-family: 'Geist Sans', system-ui, sans-serif; font-size: clamp(2.5rem, 5vw, 3.8rem); font-weight: 700; color: var(--color-text); line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 1.25rem; }
    .headline-accent { background: linear-gradient(135deg, var(--color-primary) 0%, #818CF8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Subheadline */
    .hero-subheadline { font-family: 'Lora', serif; font-size: 1.2rem; color: var(--color-text-secondary); line-height: 1.7; margin-bottom: 2.5rem; max-width: 460px; }

    /* Actions */
    .hero-actions { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .btn-primary { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--color-white); background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%); padding: 0.85rem 2rem; border-radius: var(--radius-lg); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; box-shadow: 0 4px 16px rgba(99,102,241,0.35); transition: transform 0.2s, box-shadow 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.45); }
    .btn-secondary { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.95rem; font-weight: 500; color: var(--color-text-secondary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
    .btn-secondary:hover { color: var(--color-primary); }

    /* Stats */
    .hero-stats { display: flex; gap: 2rem; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(99,102,241,0.1); }
    .stat-value { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--color-primary); }
    .stat-label { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.75rem; color: var(--color-text-secondary); }

    /* Visual */
    .hero-visual { position: relative; display: flex; align-items: center; justify-content: center; }
    .hero-glow { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; }
    .hero-card-stack { position: relative; width: 420px; height: 420px; }

    /* Main card */
    .card-main { position: absolute; inset: 0; background: var(--color-white); border-radius: 20px; border: 1px solid rgba(99,102,241,0.12); box-shadow: 0 20px 60px rgba(99,102,241,0.12), 0 4px 16px rgba(0,0,0,0.06); padding: 2rem; display: flex; flex-direction: column; animation: float-main 6s ease-in-out infinite; }
    @keyframes float-main { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-12px) rotate(0.5deg)} }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .card-title { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
    .card-badge { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.7rem; font-weight: 600; color: var(--color-primary); background: rgba(99,102,241,0.08); padding: 0.25rem 0.75rem; border-radius: 999px; }
    .content-block { background: var(--color-bg); border-radius: var(--radius-lg); padding: 0.75rem 1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.75rem; }
    .content-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--color-primary), #818CF8); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: white; }
    .content-lines { flex: 1; }
    .line { height: 8px; background: rgba(99,102,241,0.12); border-radius: 4px; margin-bottom: 6px; }
    .line.short { width: 40%; }
    .line.medium { width: 65%; }
    .line.full { width: 100%; }
    .card-progress { margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(99,102,241,0.08); }
    .progress-label { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.7rem; color: var(--color-text-secondary); margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
    .progress-pct { color: var(--color-primary); font-weight: 600; }
    .progress-bar { height: 6px; background: rgba(99,102,241,0.12); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; width: 78%; background: linear-gradient(90deg, var(--color-primary), #818CF8); border-radius: 3px; }

    /* Mini cards */
    .mini-card { position: absolute; background: var(--color-white); border-radius: 12px; border: 1px solid rgba(99,102,241,0.1); box-shadow: 0 8px 24px rgba(99,102,241,0.1); padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.6rem; }
    .mini-card-1 { top: -20px; right: -20px; animation: float-mini-1 5s ease-in-out infinite; }
    .mini-card-2 { bottom: 40px; left: -30px; animation: float-mini-2 7s ease-in-out infinite; }
    @keyframes float-mini-1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes float-mini-2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }
    .mini-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .mini-icon.green { background: #D1FAE5; }
    .mini-icon.purple { background: #EDE9FE; }
    .mini-text { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.75rem; font-weight: 600; color: var(--color-text); }
    .mini-sub { font-family: 'Geist Sans', system-ui, sans-serif; font-size: 0.65rem; color: var(--color-text-secondary); }

    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; padding: 7rem 1.5rem 3rem; text-align: center; }
      .hero-subheadline { margin: 0 auto 2.5rem; }
      .hero-actions { justify-content: center; }
      .hero-visual { display: none; }
      .hero-stats { justify-content: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">壹目贯维</a>
